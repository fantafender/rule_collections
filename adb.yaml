name: "AdBlock & Privacy Pro (Set Edition)"
description: "使用集合 (Set) 优化的结构化过滤规则，支持 no_resolve。"

rules:
  # === A. 关键字集合拦截 (REJECT-TINYGIF) ===
  - domain_keyword:
      match: 
        - admarvel
        - admaster
        - adsage
        - adsmogo
        - adsrvmedia
        - adwords
        - adservice
        - domob
        - duomeng
        - dwtrack
        - guanggao
        - lianmeng
        - mopub
        - omgmta
        - openx
        - partnerad
        - pingfore
        - supersonicads
        - uedas
        - umeng
        - usage
        - wlmonitor
        - zjtoolbar
      policy: REJECT-TINYGIF

  # === B. 后缀集合拦截 (REJECT-TINYGIF) ===
  - domain_suffix:
      match:
        - appsflyer.com
        - doubleclick.net
        - mmstat.com
        - vungle.com
      policy: REJECT-TINYGIF

  # === C. 远程规则集 (带 no_resolve 优化) ===
  - rule_set:
      match: https://ruleset.skk.moe/List/non_ip/reject-drop.conf
      policy: REJECT-DROP
      no_resolve: true
  - rule_set:
      match: https://ruleset.skk.moe/List/ip/reject.conf
      policy: REJECT-DROP
      no_resolve: true

  # === D. 大规模域名集 (DOMAIN-SET) ===
  - domain_set:
      match: https://ruleset.skk.moe/List/domainset/reject_extra.conf
      policy: REJECT
  - domain_set:
      match: https://ruleset.skk.moe/List/domainset/reject.conf
      policy: REJECT
