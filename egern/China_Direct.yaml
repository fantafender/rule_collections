name: "Domestic Direct"
description: "国内直连规则合集 (CN Direct)"
rules:
  # 微信 (User-Agent 匹配)
  - user_agent: { match: "MicroMessenger Client*", policy: "DIRECT" }
  - user_agent: { match: "WeChat*", policy: "DIRECT" }

  # 常见国内域名 (Domain Suffix 匹配)
  - domain_suffix: { match: "126.com", policy: "DIRECT" }
  - domain_suffix: { match: "126.net", policy: "DIRECT" }
  - domain_suffix: { match: "163.com", policy: "DIRECT" }
  - domain_suffix: { match: "baidu.com", policy: "DIRECT" }
  - domain_suffix: { match: "qq.com", policy: "DIRECT" }
  - domain_suffix: { match: "tencent.com", policy: "DIRECT" }
  - domain_suffix: { match: "taobao.com", policy: "DIRECT" }
  - domain_suffix: { match: "tmall.com", policy: "DIRECT" }
  - domain_suffix: { match: "jd.com", policy: "DIRECT" }
  - domain_suffix: { match: "zhihu.com", policy: "DIRECT" }
  - domain_suffix: { match: "weibo.com", policy: "DIRECT" }
  - domain_suffix: { match: "bilibili.com", policy: "DIRECT" }
  - domain_suffix: { match: "iqiyi.com", policy: "DIRECT" }
  - domain_suffix: { match: "youku.com", policy: "DIRECT" }
  - domain_suffix: { match: "xiaomi.com", policy: "DIRECT" }
  - domain_suffix: { match: "amap.com", policy: "DIRECT" }
  - domain_suffix: { match: "meituan.com", policy: "DIRECT" }
  - domain_suffix: { match: "alipay.com", policy: "DIRECT" }

    # Apple
  - domain_suffix: { match: "icloud.com", policy: "DIRECT" }
  - domain_suffix: { match: "icloud-content.com", policy: "DIRECT" }
  - domain_suffix: { match: "me.com", policy: "DIRECT" }
  - domain_suffix: { match: "apple.com", policy: "DIRECT" }
  - domain_suffix: { match: "apple-cloudkit.com", policy: "DIRECT" }
  - domain_suffix: { match: "apple-mapkit.com", policy: "DIRECT" }


  # Google 中国服务
  - domain_suffix: { match: "services.googleapis.cn", policy: "DIRECT" }
  - domain_suffix: { match: "xn--ngstr-lra8j.com", policy: "DIRECT" }

  # Google 中国 IP
  - ip_cidr: { match: "203.208.39.0/24", policy: "DIRECT", no_resolve: true }
  - ip_cidr: { match: "203.208.40.0/24", policy: "DIRECT", no_resolve: true }

  # 网易云音乐 (远程规则集)
  - rule_set: { match: "https://ruleset.skk.moe/List/non_ip/neteasemusic.conf", policy: "DIRECT" }
  - rule_set: { match: "https://ruleset.skk.moe/List/ip/neteasemusic.conf", policy: "DIRECT" }

  # Apple 中国
  - rule_set: { match: "https://ruleset.skk.moe/List/non_ip/apple_cn.conf", policy: "DIRECT" }

  # 国内规则合集 (注意：Egern 的 rule_set 同时也支持 Domain-Set)
  - rule_set: { match: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMax/ChinaMax_Domain.list", policy: "DIRECT" }
  - rule_set: { match: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMax/ChinaMax_No_IPv6.list", policy: "DIRECT" }
  - rule_set: { match: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMax/ChinaMax.list", policy: "DIRECT" }

  # 内网
  - rule_set: { match: "https://ruleset.skk.moe/List/non_ip/lan.conf", policy: "DIRECT" }

  # CN IP (放在最后作为直连判定)
  - geoip: { match: "CN", policy: "DIRECT", no_resolve: true }
